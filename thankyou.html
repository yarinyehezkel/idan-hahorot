  <style>
    :root{--purple:#10075E;--purple2:#3D507B;--lav:#9BAFD1;--pink:#E6B7A9;--pink2:#F2E9E6;--text:#17102E;--muted:#675F82;--bg:#FBFAFF;--border:#E8E4F0;--shadow:0 24px 70px rgba(16,7,94,.13);--font:"Assistant",Arial,sans-serif}*{box-sizing:border-box}body{margin:0;font-family:var(--font);background:radial-gradient(circle at 10% 8%,rgba(230,183,169,.28),transparent 28%),radial-gradient(circle at 92% 4%,rgba(155,175,209,.28),transparent 30%),var(--bg);color:var(--text);line-height:1.65}a{text-decoration:none;color:inherit}.container{width:min(900px,calc(100% - 36px));margin:auto}.wrap{min-height:100vh;display:grid;place-items:center;padding:50px 0}.card{background:#fff;border:1px solid var(--border);border-radius:36px;padding:clamp(28px,5vw,54px);box-shadow:var(--shadow);text-align:center}.badge{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:999px;background:var(--pink2);color:var(--purple);font-weight:900;margin-bottom:18px}.check{width:76px;height:76px;border-radius:24px;background:linear-gradient(135deg,var(--purple),var(--purple2));display:grid;place-items:center;color:#fff;font-size:2.1rem;margin:0 auto 20px}h1{font-size:clamp(2rem,5vw,3.4rem);line-height:1.05;color:var(--purple);margin:0 0 16px}p{color:var(--muted);font-size:1.13rem}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:30px 0}.step{background:linear-gradient(135deg,#fff,var(--pink2));border:1px solid var(--border);border-radius:22px;padding:18px;font-weight:800;color:var(--purple)}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:52px;padding:13px 25px;border-radius:999px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-weight:900;box-shadow:0 14px 34px rgba(16,7,94,.25)}@media(max-width:700px){.steps{grid-template-columns:1fr}.card{text-align:right}.check{margin-right:0}}
  </style>
</head>
<body>
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MF4RPLWL" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <main class="wrap"><div class="container"><section class="card"><div class="check">✓</div><div class="badge">הפרטים התקבלו</div><h1>תודה, הפרטים שלך נשלחו בהצלחה</h1><p>יועץ לימודים של עידן ההורות יחזור אליך בהקדם עם פרטים על קורס הדרכת הורים, אפשרויות הלימוד והמחזור הקרוב.</p><div class="steps"><div class="step">קיבלנו את הפרטים</div><div class="step">בודקים התאמה</div><div class="step">חוזרים לשיחה קצרה</div></div><a class="btn" href="/">חזרה לדף הקורס</a></section></div></main>
</body>
